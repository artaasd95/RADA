version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - rada
    profiles:
      - observability

  rada:
    image: rada:local
    build: .
    environment:
      RADA_OTEL_ENABLED: "true"
    ports:
      - "8000:8000"
    profiles:
      - observability
