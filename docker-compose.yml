version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rada
      POSTGRES_USER: rada
      POSTGRES_PASSWORD: rada
    ports:
      - "5432:5432"
    volumes:
      - rada_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rada -d rada"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  rada_postgres_data:
