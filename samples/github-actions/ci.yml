# Sample CI workflow — copy to .github/workflows/ci.yml to enable.
# MVP policy: RADA main does not ship active workflows; operators opt in locally.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Unit tests
        run: pytest tests/unit -q --strict-markers

      - name: Integration smoke
        run: pytest tests/integration -q --strict-markers -m integration
